<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل التقرير الشامل PDF</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

        :root {
            --primary: #2c3e50;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #f4f7f6; 
            padding: 15px; 
            direction: rtl; 
            margin: 0;
            line-height: 1.7;
        }
        
        #pdf-content { 
            width: 100%; 
            max-width: 850px; 
            margin: 20px auto; 
            background: white; 
            padding: 35px; 
            border: 1px solid #e0e0e0; 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            color: #000;
            overflow: hidden;
        }

        .header { 
            text-align: center; 
            border-bottom: 4px double #2c3e50; 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
        }

        .section { 
            margin-bottom: 28px; 
            padding: 20px; 
            border: 1px solid #eee; 
            border-radius: 10px;
            background: #fafcfc;

            /* 🔥 أهم إصلاح */
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .field { 
            display: flex;
            margin-bottom: 14px;
            gap: 10px;

            /* 🔥 أهم إصلاح */
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .label { 
            font-weight: 700; 
            min-width: 180px;
        }

        .value { 
            flex: 1;
            word-break: break-word;
        }

        .btn-container { 
            text-align: center; 
            margin-bottom: 25px; 
        }

        .btn-download { 
            background: #27ae60; 
            color: white; 
            border: none; 
            padding: 16px 40px; 
            border-radius: 50px; 
            font-weight: 700; 
            cursor: pointer; 
        }

        @media print { 
            .no-print { display: none; } 
        }
    </style>
</head>

<body>

<div class="btn-container no-print">
    <h2 id="status">جاري تحميل البيانات...</h2>
    <button class="btn-download" id="manualBtn" onclick="generatePDF()" style="display:none;">
        تحميل PDF
    </button>
</div>

<div id="pdf-content">
    <div class="header">
        <h1>التقرير الشامل</h1>
    </div>

    <div id="dynamic-container"></div>
</div>

<script>
let reportData = null;

function buildDynamicContent(container, data) {
    for (const [key, value] of Object.entries(data)) {

        if (value === null || value === "" || value === undefined) continue;

        if (typeof value === 'object' && !Array.isArray(value)) {

            const section = document.createElement('div');
            section.className = 'section';

            const title = document.createElement('h3');
            title.innerText = key;

            section.appendChild(title);
            buildDynamicContent(section, value);
            container.appendChild(section);

        } else {

            const field = document.createElement('div');
            field.className = 'field';

            const label = document.createElement('span');
            label.className = 'label';
            label.innerText = key + " :";

            const val = document.createElement('span');
            val.className = 'value';

            if (typeof value === 'boolean') {
                val.innerText = value ? "نعم" : "لا";
            } else if (Array.isArray(value)) {
                val.innerText = value.join(" • ");
            } else {
                val.innerText = value;
            }

            field.appendChild(label);
            field.appendChild(val);
            container.appendChild(field);
        }
    }
}

window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const encodedData = urlParams.get('data');

    if (!encodedData) {
        document.getElementById('status').innerText = "لا توجد بيانات";
        return;
    }

    try {
        const decoded = decodeURIComponent(escape(atob(encodedData)));
        reportData = JSON.parse(decoded);

        const container = document.getElementById('dynamic-container');
        buildDynamicContent(container, reportData);

        document.getElementById('status').innerText = "تم تحميل البيانات";
        document.getElementById('manualBtn').style.display = "inline-block";

        setTimeout(generatePDF, 1000);

    } catch (e) {
        document.getElementById('status').innerText = "خطأ في البيانات";
    }
};

function generatePDF() {
    const element = document.getElementById('pdf-content');

    const opt = {
        margin: 10,
        filename: 'report.pdf',

        image: { type: 'jpeg', quality: 1 },

        html2canvas: {
            scale: 2, // 🔥 لا ترفعها
            useCORS: true,
            letterRendering: true
        },

        jsPDF: {
            unit: 'mm',
            format: 'a4',
            orientation: 'portrait'
        },

        /* 🔥 أهم سطر */
        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    };

    document.getElementById('status').innerText = "جاري إنشاء PDF...";

    html2pdf()
        .set(opt)
        .from(element)
        .save()
        .then(() => {
            document.getElementById('status').innerText = "تم التحميل";
        })
        .catch(() => {
            document.getElementById('status').innerText = "خطأ في التصدير";
        });
}
</script>

</body>
</html>
