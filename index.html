<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل التقرير الشامل PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; padding: 20px; direction: rtl; }
        #pdf-content { 
            width: 100%; max-width: 800px; margin: auto; background: white; 
            padding: 40px; border: 1px solid #ccc; color: #000;
        }
        .header { text-align: center; border-bottom: 3px double #000; padding-bottom: 10px; margin-bottom: 30px; }
        .dynamic-section { margin-bottom: 20px; border: 1px solid #eee; padding: 15px; border-radius: 5px; }
        .field { margin: 10px 0; display: flex; gap: 15px; border-bottom: 1px dashed #f0f0f0; padding-bottom: 8px; align-items: flex-start; }
        .label { font-weight: bold; min-width: 160px; color: #2c3e50; }
        .value { flex: 1; color: #333; word-wrap: break-word; }
        .btn-container { text-align: center; margin-bottom: 20px; }
        .btn-download { background: #2ecc71; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; font-size: 16px; transition: background 0.3s; }
        .btn-download:hover { background: #27ae60; }
    </style>
</head>
<body>

<div class="btn-container">
    <h2 id="status">جاري معالجة البيانات...</h2>
    <button class="btn-download" id="manualBtn" onclick="generatePDF()" style="display: none;">📥 تحميل ملف PDF</button>
</div>

<div id="pdf-content">
    <div class="header">
        <h1>التقرير اليومي للمشرف التربوي</h1>
        <p>وثيقة رسمية مستخرجة رقمياً</p>
    </div>

    <div id="dynamic-fields-container" class="dynamic-section"></div>
</div>

<script>
    let reportData = null;

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('data');

        if (encodedData) {
            try {
                // فك التشفير وتحويل البيانات
                const decodedJSON = decodeURIComponent(escape(atob(encodedData)));
                reportData = JSON.parse(decodedJSON);
                
                const container = document.getElementById('dynamic-fields-container');
                container.innerHTML = ''; // مسح أي محتوى سابق
                
                // المرور على كل مفتاح وقيمة في كائن JSON
                for (const [key, value] of Object.entries(reportData)) {
                    // تجاهل الحقول الفارغة أو التي تحتوي على null لعدم تشويه التقرير
                    if (value === null || value === "" || value === undefined) continue;

                    const fieldDiv = document.createElement('div');
                    fieldDiv.className = 'field';

                    const labelSpan = document.createElement('span');
                    labelSpan.className = 'label';
                    labelSpan.innerText = key + " :"; // المفتاح يمثل العنوان (الرجاء إرساله بالعربية من التطبيق)

                    const valueSpan = document.createElement('span');
                    valueSpan.className = 'value';
                    
                    // تحويل القيم المنطقية أو المصفوفات إلى نص مقروء لتجنب الأخطاء البرمجية في العرض
                    if (typeof value === 'boolean') {
                        valueSpan.innerText = value ? "نعم" : "لا";
                    } else if (typeof value === 'object') {
                        valueSpan.innerText = Array.isArray(value) ? value.join(' - ') : JSON.stringify(value);
                    } else {
                        valueSpan.innerText = value;
                    }

                    fieldDiv.appendChild(labelSpan);
                    fieldDiv.appendChild(valueSpan);
                    container.appendChild(fieldDiv);
                }

                document.getElementById('status').innerText = "✅ تم بناء التقرير بنجاح";
                document.getElementById('manualBtn').style.display = "inline-block";
                
                // بدء التحميل تلقائياً بعد ثانية
                setTimeout(generatePDF, 1000);

            } catch (e) {
                document.getElementById('status').innerText = "❌ خطأ: فشل في فك التشفير أو قراءة بنية البيانات.";
                console.error("Data parsing error:", e);
            }
        } else {
            document.getElementById('status').innerText = "⚠️ لم يتم استلام أي بيانات في الرابط.";
        }
    };

    function generatePDF() {
        if (!reportData) return;
        
        const element = document.getElementById('pdf-content');
        // البحث عن أي حقل يحتوي على كلمة "تاريخ" لتسمية الملف، وإلا استخدام تاريخ اليوم
        let dateForFilename = new Date().toLocaleDateString('en-GB').replace(/\//g, '-');
        const dateKey = Object.keys(reportData).find(k => k.includes('تاريخ') || k.includes('Date') || k.includes('date'));
        if (dateKey && reportData[dateKey]) {
            dateForFilename = reportData[dateKey].replace(/[/:\\]/g, '-');
        }

        const opt = {
            margin: 0.3,
            filename: `تقرير_مشرف_${dateForFilename}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, letterRendering: true, useCORS: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
