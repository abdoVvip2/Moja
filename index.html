<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير حضور المطعم المدرسي - PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; padding: 15px; direction: rtl; }
        
        #pdf-content { 
            width: 100%; max-width: 800px; margin: auto; background: white; 
            padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .header { text-align: center; border-bottom: 3px solid #2c3e50; margin-bottom: 20px; padding-bottom: 10px; }
        
        /* تنسيق الجدول لضمان ظهور الأسماء بشكل احترافي */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #2c3e50; color: white; }
        .present { color: #27ae60; font-weight: bold; }
        .absent { color: #e74c3c; font-weight: bold; }

        .info-bar { display: flex; justify-content: space-between; background: #ecf0f1; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .btn-download { background: #27ae60; color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; }
        .no-print { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="no-print">
    <h2 id="status">جاري معالجة البيانات...</h2>
    <button class="btn-download" id="manualBtn" onclick="generatePDF()" style="display:none;">تحميل تقرير PDF</button>
</div>

<div id="pdf-content">
    <div class="header">
        <h1>كشف حضور المطعم المدرسي</h1>
    </div>

    <div id="info-section" class="info-bar">
        </div>

    <div id="data-table-container">
        </div>
</div>

<script>
function decodeData() {
    const urlParams = new URLSearchParams(window.location.search);
    const encodedData = urlParams.get('data');

    if (!encodedData) {
        document.getElementById('status').innerText = "خطأ: لا توجد بيانات مستلمة";
        return;
    }

    try {
        // فك تشفير Base64 مع دعم العربية
        const decoded = JSON.parse(decodeURIComponent(escape(atob(encodedData))));
        
        // 1. عرض معلومات القسم والتاريخ
        const infoSection = document.getElementById('info-section');
        infoSection.innerHTML = `
            <div><strong>القسم:</strong> ${decoded.className || 'غير محدد'}</div>
            <div><strong>التاريخ:</strong> ${decoded.date || '---'}</div>
        `;

        // 2. بناء جدول الطلاب
        const tableContainer = document.getElementById('data-table-container');
        if (decoded.students && Array.isArray(decoded.students)) {
            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th style="width: 10%">#</th>
                            <th style="width: 60%">اسم الطالب</th>
                            <th style="width: 30%">حالة الحضور</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            decoded.students.forEach((student, index) => {
                const statusText = student.s === 'present' ? 'حاضر' : 'غائب';
                const statusClass = student.s === 'present' ? 'present' : 'absent';
                
                tableHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${student.n}</td>
                        <td class="${statusClass}">${statusText}</td>
                    </tr>
                `;
            });

            tableHTML += `</tbody></table>`;
            tableContainer.innerHTML = tableHTML;
        }

        document.getElementById('status').innerText = "تم تجهيز التقرير";
        document.getElementById('manualBtn').style.display = "inline-block";

    } catch (e) {
        console.error(e);
        document.getElementById('status').innerText = "خطأ في قراءة البيانات";
    }
}

window.onload = decodeData;

function generatePDF() {
    const element = document.getElementById('pdf-content');
    const opt = {
        margin: 10,
        filename: 'attendance_report.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: 'avoid-all' }
    };

    html2pdf().set(opt).from(element).save();
}
</script>
</body>
</html>
