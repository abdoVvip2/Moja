<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل التقرير الشامل PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; padding: 20px; direction: rtl; }
        
        #pdf-content { 
            width: 100%; max-width: 800px; margin: auto; background: white; 
            padding: 30px; border: 1px solid #ccc; color: #000;
        }
        .header { text-align: center; border-bottom: 3px double #000; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* القسم الديناميكي */
        .section { margin-bottom: 20px; border: 1px solid #eee; padding: 15px; border-radius: 5px; }
        .field { 
            margin: 10px 0; 
            padding-bottom: 8px; 
            border-bottom: 1px dashed #f0f0f0;
            display: block; /* تغيير من flex لتفادي قطع النصوص في pdf */
            line-height: 1.6;
        }
        .label { font-weight: bold; color: #444; margin-left: 10px; display: inline-block; min-width: 150px; }
        .value { color: #000; display: inline; word-wrap: break-word; }
        
        .btn-container { text-align: center; margin-bottom: 20px; }
        .btn-download { background: #2ecc71; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; }
        
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="btn-container no-print">
    <h2 id="status">جاري معالجة البيانات...</h2>
    <button class="btn-download" id="manualBtn" onclick="generatePDF()" style="display: none;">📥 تحميل ملف PDF الشامل</button>
</div>

<div id="pdf-content">
    <div class="header">
        <h1>التقرير الشامل للمشرف التربوي</h1>
        <p>وثيقة رقمية معتمدة</p>
    </div>

    <div id="dynamic-container" class="section">
        </div>
</div>

<script>
    let reportData = null;

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('data');

        if (encodedData) {
            try {
                // فك التشفير
                const decodedJSON = decodeURIComponent(escape(atob(encodedData)));
                reportData = JSON.parse(decodedJSON);
                
                const container = document.getElementById('dynamic-container');
                container.innerHTML = ''; 

                // بناء الحقول ديناميكياً بناءً على ما وصل من التطبيق
                for (const [key, value] of Object.entries(reportData)) {
                    if (value === null || value === "" || value === undefined) continue;

                    const fieldDiv = document.createElement('div');
                    fieldDiv.className = 'field';

                    const labelSpan = document.createElement('span');
                    labelSpan.className = 'label';
                    labelSpan.innerText = key + " :";

                    const valueSpan = document.createElement('span');
                    valueSpan.className = 'value';
                    
                    // تحويل القيم لتناسب النص
                    if (typeof value === 'boolean') {
                        valueSpan.innerText = value ? "نعم" : "لا";
                    } else if (Array.isArray(value)) {
                        valueSpan.innerText = value.join(' - ');
                    } else {
                        valueSpan.innerText = value;
                    }

                    fieldDiv.appendChild(labelSpan);
                    fieldDiv.appendChild(valueSpan);
                    container.appendChild(fieldDiv);
                }

                document.getElementById('status').innerText = "✅ تم استيراد كافة البيانات بنجاح";
                document.getElementById('manualBtn').style.display = "inline-block";
                
                // تشغيل التحميل تلقائياً
                setTimeout(generatePDF, 1200);

            } catch (e) {
                document.getElementById('status').innerText = "❌ فشل في فك التشفير";
                console.error(e);
            }
        }
    };

    function generatePDF() {
        const element = document.getElementById('pdf-content');
        
        // إعدادات تضمن عدم خروج المحتوى عن الورقة A4
        const opt = {
            margin:       [0.5, 0.5],
            filename:     'تقرير_شامل.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { 
                scale: 2, 
                useCORS: true, 
                letterRendering: false, // لضمان تماسك الحروف العربية
                width: element.clientWidth // إجبار المحرك على العرض الحالي
            },
            jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
