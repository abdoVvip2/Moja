<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستخرج الذكي للتقارير</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; padding: 20px; direction: rtl; color: #333; }
        #pdf-content { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); min-height: 297mm; }
        .header { text-align: center; border-bottom: 5px solid #2c3e50; margin-bottom: 30px; padding-bottom: 20px; }
        .data-row { display: flex; border-bottom: 1px solid #eee; padding: 10px 0; }
        .data-label { font-weight: 700; width: 150px; color: #555; }
        .data-value { flex: 1; word-break: break-all; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: center; }
        th { background: #34495e; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .no-print { text-align: center; margin-bottom: 30px; }
        .btn-download { background: #2ecc71; color: white; border: none; padding: 15px 40px; border-radius: 30px; cursor: pointer; font-size: 18px; font-weight: bold; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        .section-title { background: #eee; padding: 8px; margin-top: 20px; font-weight: bold; border-right: 5px solid #2c3e50; }
    </style>
</head>
<body>

<div class="no-print">
    <h2 id="status">🔍 جاري تحليل البيانات الذكي...</h2>
    <button class="btn-download" id="manualBtn" onclick="generatePDF()" style="display:none;">تحميل التقرير PDF</button>
</div>

<div id="pdf-content">
    <div class="header">
        <h1>التقرير الإداري الشامل</h1>
        <p id="current-date"></p>
    </div>
    <div id="dynamic-body"></div>
</div>

<script>
function renderAnyData(data, container) {
    if (typeof data !== 'object' || data === null) {
        container.innerHTML += `<div class="data-value">${data}</div>`;
        return;
    }

    for (let key in data) {
        let value = data[key];

        // إذا كانت القيمة مصفوفة (Array) -> نحولها لجدول فوراً
        if (Array.isArray(value)) {
            container.innerHTML += `<div class="section-title">بيانات: ${key}</div>`;
            container.appendChild(createTable(value));
        } 
        // إذا كانت القيمة كائن (Object) -> نفككه لصفوف
        else if (typeof value === 'object') {
            const subDiv = document.createElement('div');
            subDiv.className = "section-data";
            subDiv.innerHTML = `<div class="section-title">${key}</div>`;
            renderAnyData(value, subDiv);
            container.appendChild(subDiv);
        } 
        // قيمة عادية (نص أو رقم)
        else {
            container.innerHTML += `
                <div class="data-row">
                    <div class="data-label">${key}:</div>
                    <div class="data-value">${value}</div>
                </div>
            `;
        }
    }
}

function createTable(array) {
    const table = document.createElement('table');
    if (array.length === 0) return table;

    // استخراج العناوين من أول عنصر في المصفوفة تلقائياً
    const headers = Object.keys(array[0]);
    let thead = `<thead><tr><th>#</th>`;
    headers.forEach(h => thead += `<th>${h}</th>`);
    thead += `</tr></thead>`;

    let tbody = `<tbody>`;
    array.forEach((item, index) => {
        tbody += `<tr><td>${index + 1}</td>`;
        headers.forEach(h => {
            let val = item[h];
            // تحويل الحالات الإنجليزية لعربية لو وجدت (حاضر/غائب)
            if(val === 'present') val = '✔ حاضر';
            if(val === 'absent') val = '✖ غائب';
            tbody += `<td>${val}</td>`;
        });
        tbody += `</tr>`;
    });
    tbody += `</tbody>`;

    table.innerHTML = thead + tbody;
    return table;
}

window.onload = function() {
    document.getElementById('current-date').innerText = "تاريخ الاستخراج: " + new Date().toLocaleDateString('ar-DZ');
    const urlParams = new URLSearchParams(window.location.search);
    const encodedData = urlParams.get('data');

    if (!encodedData) {
        document.getElementById('status').innerText = "❌ لا توجد بيانات في الرابط";
        return;
    }

    try {
        // فك التشفير العالمي (يدعم Base64 + UTF-8)
        const decoded = JSON.parse(decodeURIComponent(escape(atob(encodedData))));
        const container = document.getElementById('dynamic-body');
        
        renderAnyData(decoded, container);

        document.getElementById('status').innerText = "✅ تم تجهيز التقرير بنجاح";
        document.getElementById('manualBtn').style.display = "inline-block";
        setTimeout(generatePDF, 1500); // تحميل تلقائي بعد ثانية ونصف
    } catch (e) {
        console.error(e);
        document.getElementById('status').innerText = "❌ خطأ في ترميز البيانات المرسلة";
    }
};

function generatePDF() {
    const element = document.getElementById('pdf-content');
    const opt = {
        margin: 5,
        filename: 'Universal_Report.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    };
    html2pdf().set(opt).from(element).save();
}
</script>
</body>
</html>
